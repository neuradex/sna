name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # npm packages
          cd packages/core && npm version "$VERSION" --no-git-tag-version
          cd ../react && npm version "$VERSION" --no-git-tag-version
          cd ../..
          # plugin
          node -e "const f='plugins/sna-builder/.claude-plugin/plugin.json';const j=JSON.parse(require('fs').readFileSync(f));j.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          # marketplace
          node -e "const f='.claude-plugin/marketplace.json';const j=JSON.parse(require('fs').readFileSync(f));j.plugins.forEach(p=>p.version='$VERSION');require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      - name: Build
        run: |
          pnpm --filter @sna-sdk/core build
          pnpm --filter @sna-sdk/react build

      - name: Publish @sna-sdk/core
        run: cd packages/core && npm publish --access public --provenance

      - name: Publish @sna-sdk/react
        run: cd packages/react && npm publish --access public --provenance

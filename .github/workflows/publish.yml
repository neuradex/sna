name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Set version and commit
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          VERSION="${VERSION#.}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npx tsx scripts/set-version.ts "$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release v$VERSION" || true
          git push origin HEAD:main

      - name: Build
        run: |
          pnpm --filter @sna-sdk/core build
          pnpm --filter @sna-sdk/react build

      - name: Publish @sna-sdk/core
        run: pnpm --filter @sna-sdk/core publish --access public --provenance --no-git-checks

      - name: Publish @sna-sdk/react
        run: pnpm --filter @sna-sdk/react publish --access public --provenance --no-git-checks

version: 1
skill: test-multi-step

params:
  target:
    type: string
    required: true
  count:
    type: integer

steps:
  # Step 1: exec — auto-executed, extracts nested data
  - id: fetch-config
    name: "設定取得"
    exec: "echo '{\"server\": {\"host\": \"localhost\", \"port\": 3000}, \"items\": [{\"name\": \"a\"}, {\"name\": \"b\"}]}'"
    extract:
      server_host: ".server.host"
      server_port: ".server.port"
      item_names: "[.[] | .name]"
      first_item: ".items[0].name"
    event: "設定取得完了: {{server_host}}:{{server_port}}"

  # Step 2: exec — chained auto-execution
  - id: check-status
    name: "ステータス確認"
    exec: "echo '{\"status\": \"ok\", \"version\": \"2.1.0\"}'"
    extract:
      api_status: ".status"
      api_version: ".version"
    event: "API {{api_status}} (v{{api_version}})"

  # Step 3: instruction — first model work (submit + handler)
  - id: collect-data
    name: "データ収集"
    instruction: |
      「{{target}}」のデータを収集してください。
      サーバー: {{server_host}}:{{server_port}}
      API status: {{api_status}} (v{{api_version}})

      JSON配列で提出:
    submit:
      type: array
      items:
        name: { type: string, required: true }
        value: { type: integer, required: true }
        category: { type: string }
    handler: |
      echo '{"processed": 3, "total": 5}'
    extract:
      processed: ".processed"
      total: ".total"
    event: "{{processed}}/{{total}} 件処理"
    timeout: 60000

  # Step 4: instruction — second model work (data pattern)
  - id: review
    name: "レビュー"
    instruction: |
      {{processed}}/{{total}} 件のデータをレビューしてください。
      問題があれば報告してください。
    data:
      - key: approved_count
        when: after
        type: integer
        label: "承認数"
      - key: rejected_count
        when: after
        type: integer
        label: "却下数"
    event: "レビュー完了: {{approved_count}}件承認, {{rejected_count}}件却下"

complete: "✓ {{target}}: {{processed}}件処理, {{approved_count}}件承認, {{rejected_count}}件却下"
error: "{{target}} 処理失敗: {{error}}"
